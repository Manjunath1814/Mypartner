<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vivaha | Onboarding</title>

    <link rel="stylesheet" href="onboarding.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="page">

    <!-- Progress -->

    <div class="progress-section">

        <div class="logo">

            <div class="logo-circle">
                💜
            </div>

            <div>
                <h1>Vivaha</h1>
                <p>Create your profile</p>
            </div>

        </div>

        <div class="progress-bar">

            <div id="progressFill"></div>

        </div>

    </div>


    <!-- Card -->

    <div class="card">

        <h2>Let's get to know you</h2>

        <p class="subtitle">
            This takes less than 2 minutes.
        </p>


        <!-- Full Name -->

        <div class="input-group">

            <label>Full Name</label>

            <input
                id="fullName"
                type="text"
                placeholder="Enter your full name">

        </div>


        <!-- Looking For -->

        <div class="input-group">

            <label>Looking For</label>

            <div class="option-grid">

                <button
                    class="option-btn"
                    type="button"
                    data-looking="Bride">

                    Bride

                </button>

                <button
                    class="option-btn"
                    type="button"
                    data-looking="Groom">

                    Groom

                </button>

            </div>

        </div>



        <!-- Gender -->

        <div class="input-group">

            <label>Gender</label>

            <div class="option-grid">

                <button
                    class="option-btn"
                    type="button"
                    data-gender="Male">

                    Male

                </button>

                <button
                    class="option-btn"
                    type="button"
                    data-gender="Female">

                    Female

                </button>

            </div>

        </div>



        <!-- Date Of Birth -->

        <div class="input-group">

            <label>Date of Birth</label>

            <input
                id="dob"
                type="date">

        </div>



        <!-- Age -->

        <div class="input-group">

            <label>Age</label>

            <input
                id="age"
                type="text"
                readonly
                placeholder="Calculated Automatically">

        </div>



        <!-- District -->

        <div class="input-group">

            <label>District</label>

            <select id="district">

                <option value="">Select District</option>

                <option>Bagalkote</option>
                <option>Ballari</option>
                <option>Belagavi</option>
                <option>Bengaluru Rural</option>
                <option>Bengaluru Urban</option>
                <option>Bidar</option>
                <option>Chamarajanagar</option>
                <option>Chikkaballapur</option>
                <option>Chikkamagaluru</option>
                <option>Chitradurga</option>
                <option>Dakshina Kannada</option>
                <option>Davanagere</option>
                <option>Dharwad</option>
                <option>Gadag</option>
                <option>Hassan</option>
                <option>Haveri</option>
                <option>Kalaburagi</option>
                <option>Kodagu</option>
                <option>Kolar</option>
                <option>Koppal</option>
                <option>Mandya</option>
                <option>Mysuru</option>
                <option>Raichur</option>
                <option>Ramanagara</option>
                <option>Shivamogga</option>
                <option>Tumakuru</option>
                <option>Udupi</option>
                <option>Uttara Kannada</option>
                <option>Vijayapura</option>
                <option>Yadgir</option>
                <option>Vijayanagara</option>

            </select>

        </div>

              <!-- Highest Education -->

        <div class="input-group">

            <label for="education">Highest Education</label>

            <select id="education">

                <option value="">Select Education</option>

                <option>SSLC</option>
                <option>PUC</option>
                <option>Diploma</option>
                <option>ITI</option>
                <option>Bachelor's Degree</option>
                <option>Master's Degree</option>
                <option>Doctorate (PhD)</option>
                <option>MBBS</option>
                <option>BDS</option>
                <option>B.E / B.Tech</option>
                <option>M.E / M.Tech</option>
                <option>BCA</option>
                <option>MCA</option>
                <option>B.Com</option>
                <option>M.Com</option>
                <option>CA</option>
                <option>CS</option>
                <option>Other</option>

            </select>

        </div>


        <!-- Occupation -->

        <div class="input-group">

            <label for="occupation">Occupation</label>

            <input
                id="occupation"
                type="text"
                placeholder="Software Engineer, Teacher, Business..."
            >

        </div>


        <!-- Annual Income -->

        <div class="input-group">

            <label for="income">Annual Income</label>

            <select id="income">

                <option value="">Select Income</option>

                <option>Below ₹2 Lakh</option>
                <option>₹2 - ₹5 Lakh</option>
                <option>₹5 - ₹10 Lakh</option>
                <option>₹10 - ₹20 Lakh</option>
                <option>₹20 - ₹50 Lakh</option>
                <option>₹50 Lakh - ₹1 Crore</option>
                <option>Above ₹1 Crore</option>

            </select>

        </div>


        <!-- Family Annual Income -->

        <div class="input-group">

            <label for="familyIncome">Family Annual Income</label>

            <select id="familyIncome">

                <option value="">Select Income</option>

                <option>Below ₹2 Lakh</option>
                <option>₹2 - ₹5 Lakh</option>
                <option>₹5 - ₹10 Lakh</option>
                <option>₹10 - ₹20 Lakh</option>
                <option>₹20 - ₹50 Lakh</option>
                <option>₹50 Lakh - ₹1 Crore</option>
                <option>Above ₹1 Crore</option>

            </select>

        </div>


        <!-- Profile Photo -->

        <div class="input-group">

            <label>Profile Photo</label>

            <div class="upload-box" id="uploadBox">

                <img
                    id="previewImage"
                    src=""
                    alt="Preview"
                    class="preview-image"
                >

                <p class="upload-text">
                    Tap to upload your profile picture
                </p>

                <input
                    id="profilePhoto"
                    type="file"
                    accept="image/*"
                    hidden
                >

            </div>

        </div>


        <!-- Action Buttons -->

        <div class="button-group">

            <button
                id="continueBtn"
                class="primary-btn"
                type="button"
            >

                Continue

            </button>

        </div>

    </div>

</div>


<!-- Toast -->

<div id="toast" class="toast"></div>


<!-- Loading -->

<div id="loadingOverlay" class="loading-overlay">

    <div class="loader"></div>

    <p>Creating your profile...</p>

</div>


<script type="module" src="onboarding.js"></script>

</body>
</html>
