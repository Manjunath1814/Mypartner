<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vivaha | Complete Profile</title>

    <link rel="stylesheet" href="css/onboarding.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="glass-card">

        <div class="logo">

    <img src="assets/logo.png" alt="Vivaha Logo">

    <h1>Vivaha</h1>

    <p>
        Let's create your profile in under 1 minute.
    </p>

        </div>

        <div class="progress">

            <div class="progress-fill"></div>

        </div>

        <form id="onboardingForm">

            <!-- Name -->

            <div class="input-group">

                <label>Full Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    required>

            </div>

            <!-- Gender -->

            <div class="input-group">

                <label>Gender</label>

                <select id="gender" required>

                    <option value="">Select Gender</option>

                    <option value="Male">Male</option>

                    <option value="Female">Female</option>

                </select>

            </div>

            <!-- Looking For -->

            <div class="input-group">

                <label>Looking For</label>

                <input
                    type="text"
                    id="lookingFor"
                    readonly>

            </div>

            <!-- Education -->

            <div class="input-group">

                <label>Highest Education</label>

                <select id="education" required>

                    <option value="">Select Education</option>

                    <option>SSLC</option>
                    <option>PUC</option>
                    <option>Diploma</option>
                    <option>Graduate</option>
                    <option>Post Graduate</option>
                    <option>Doctorate</option>

                </select>

            </div>

            <!-- District -->

            <div class="input-group">

                <label>District</label>

                <select id="district" required>

                    <option value="">Select District</option>

                    <option>Bagalkot</option>
                    <option>Ballari</option>
                    <option>Belagavi</option>
                    <option>Bengaluru Rural</option>
                    <option>Bengaluru Urban</option>
                    <option>Bidar</option>
                    <option>Chamarajanagar</option>
                    <option>Chikkaballapur</option>
                    <option>Chikkamagaluru</option>
                    <option>Chitradurga</option>
                    <option>Dakshina Kannada</option>
                    <option>Davanagere</option>
                    <option>Dharwad</option>
                    <option>Gadag</option>
                    <option>Hassan</option>
                    <option>Haveri</option>
                    <option>Kalaburagi</option>
                    <option>Kodagu</option>
                    <option>Kolar</option>
                    <option>Koppal</option>
                    <option>Mandya</option>
                    <option>Mysuru</option>
                    <option>Raichur</option>
                    <option>Ramanagara</option>
                    <option>Shivamogga</option>
                    <option>Tumakuru</option>
                    <option>Udupi</option>
                    <option>Uttara Kannada</option>
                    <option>Vijayanagara</option>
                    <option>Vijayapura</option>
                    <option>Yadgir</option>

                </select>

            </div>

            <button type="submit">

                Continue

            </button>

        </form>

    </div>

</div>

<script type="module" src="js/onboarding.js"></script>

</body>

</html>
