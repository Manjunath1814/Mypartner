<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivaha • Basic Details</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/basic-details.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <!-- Progress -->

    <div class="top-section">

        <div class="step">
            Step <span id="currentStep">1</span> of 8
        </div>

        <div class="progress">

            <div class="progress-fill"></div>

        </div>

    </div>

    <!-- Card -->

    <div class="glass-card fade">

        <div class="logo">

            💜

        </div>

        <h1>Create Your Vivaha Profile</h1>

        <p class="subtitle">
            Let's begin with a few basic details to build your profile.
        </p>

        <!-- FORM -->

        <form id="basicForm">

            <div class="input-group">

                <label>Looking For</label>

                <select id="lookingFor" required>

                    <option value="">Select</option>

                    <option>Bride</option>

                    <option>Groom</option>

                </select>

            </div>

            <div class="input-group">

                <label>Gender</label>

                <select id="gender" required>

                    <option value="">Select</option>

                    <option>Male</option>

                    <option>Female</option>

                    <option>Other</option>

                </select>

            </div>

            <div class="input-group">

                <label>Date of Birth</label>

                <input
                type="date"
                id="dob"
                required>

            </div>

            <div class="input-group">

                <label>Mobile Number</label>

                <input
                type="tel"
                id="mobile"
                maxlength="10"
                placeholder="Enter Mobile Number"
                required>

            </div>

            <div class="input-group">

                <label>District</label>

                <input
                type="text"
                id="district"
                placeholder="District"
                required>

            </div>

            <div class="input-group">

                <label>City</label>

                <input
                type="text"
                id="city"
                placeholder="City"
                required>

            </div>

            <div class="input-group">

                <label>Language</label>

                <select id="language" required>

                    <option value="">Select</option>

                    <option>Kannada</option>

                    <option>Hindi</option>

                    <option>English</option>

                    <option>Tamil</option>

                    <option>Telugu</option>

                    <option>Malayalam</option>

                    <option>Marathi</option>

                    <option>Other</option>

                </select>

            </div>

            <div id="errorBox"></div>

            <div class="button-area">

                

                <button
type="submit"
id="continueBtn"
class="primary"
disabled>

Continue
                </button>
            </div>

        </form>

    </div>

</div>

<script type="module" src="../js/basic-details.js"></script>

</body>
</html>
