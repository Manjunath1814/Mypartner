<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Vivaha | My Profile</title>

<link rel="stylesheet"
href="css/profile.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="back">

<i class="fa-solid fa-arrow-left"></i>

</div>

<h2>

My Profile

</h2>

<div class="settings">

<i class="fa-solid fa-gear"></i>

</div>

</header>

<!-- ================= CONTENT ================= -->

<div class="container">

<!-- ================= PROFILE CARD ================= -->

<section class="profile-card">

<div class="image-area">

<img
id="profilePhoto"
src="../assets/default-user.png">

<label
for="photoUpload"
class="camera">

<i class="fa-solid fa-camera"></i>

</label>

<input
type="file"
id="photoUpload"
hidden>

</div>

<h2 id="userName">

Loading...

</h2>

<p id="userDistrict">

Karnataka

</p>

<div class="verified">

<i class="fa-solid fa-circle-check"></i>

Verified Profile

</div>

</section>

<!-- ================= PROFILE COMPLETION ================= -->

<section class="completion-card">

<div class="top">

<h3>

Complete Your Profile

</h3>

<span id="percentage">

35%

</span>

</div>

<div class="progress">

<div
class="progress-fill"
id="progressFill">

</div>

</div>

<p>

Complete your profile to receive better AI matches.

</p>

</section>

<!-- ================= BASIC DETAILS ================= -->

<section class="card">

<div class="card-title">

<i class="fa-solid fa-user"></i>

<h3>

Basic Information

</h3>

</div>

<div class="input-group">

<label>

Full Name

</label>

<input
type="text"
id="name">

</div>

<div class="input-group">

<label>

Gender

</label>

<select
id="gender">

<option>

Male

</option>

<option>

Female

</option>

</select>

</div>

<div class="input-group">

<label>

Date of Birth

</label>

<input
type="date"
id="dob">

</div>

<div class="input-group">

<label>

District

</label>

<input
type="text"
id="district">

</div>

<div class="input-group">

<label>

Height

</label>

<input
type="text"
id="height"
placeholder="170 cm">

</div>

<button
id="saveBasic">

Save Basic Details

</button>

</section>

<!-- ================= EDUCATION ================= -->

<section class="card">

<div class="card-title">

<i class="fa-solid fa-graduation-cap"></i>

<h3>

Education & Career

</h3>

</div>

<div class="input-group">

<label>

Education

</label>

<input
type="text"
id="education">

</div>

<div class="input-group">

<label>

Occupation

</label>

<input
type="text"
id="occupation">

</div>

<div class="input-group">

<label>

Company

</label>

<input
type="text"
id="company">

</div>

<div class="input-group">

<label>

Annual Income

</label>

<input
type="number"
id="income">

</div>

<button
id="saveEducation">

Save Education

</button>

</section>

<!-- ================= LIFESTYLE ================= -->

<section class="card">

<div class="card-title">

<i class="fa-solid fa-heart"></i>

<h3>

Lifestyle

</h3>

</div>

<div class="input-group">

<label>

Food Preference

</label>

<select id="food">

<option>Vegetarian</option>

<option>Eggetarian</option>

<option>Non Vegetarian</option>

</select>

</div>

<div class="input-group">

<label>

Smoking

</label>

<select id="smoking">

<option>No</option>

<option>Occasionally</option>

<option>Yes</option>

</select>

</div>

<div class="input-group">

<label>

Alcohol

</label>

<select id="alcohol">

<option>No</option>

<option>Occasionally</option>

<option>Yes</option>

</select>

</div>

<div class="input-group">

<label>

About Me

</label>

<textarea
id="about"
placeholder="Tell everyone about yourself..."></textarea>

</div>

<button
id="saveLifestyle">

Save Lifestyle

</button>

</section>

</div>

<script
type="module"
src="profile.js">

</script>

</body>

</html>
