<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vivaha | Family Details</title>

<link rel="stylesheet" href="css/family.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="glass-card">

<div class="progress">

<span>Step 3 of 8</span>

<div class="bar">

<div class="fill"></div>

</div>

</div>

<h1>Family Details</h1>

<p>Help us understand your family background.</p>

<form id="familyForm">

<div class="input-group">

<label>Father's Name</label>

<input type="text" id="father">

</div>

<div class="input-group">

<label>Mother's Name</label>

<input type="text" id="mother">

</div>

<div class="input-group">

<label>Family Type</label>

<select id="familyType">

<option value="">Select</option>

<option>Nuclear Family</option>

<option>Joint Family</option>

</select>

</div>

<div class="input-group">

<label>Father's Occupation</label>

<input type="text" id="fatherOccupation">

</div>

<div class="input-group">

<label>Mother's Occupation</label>

<input type="text" id="motherOccupation">

</div>

<div class="input-group">

<label>Brothers</label>

<input type="number" id="brothers">

</div>

<div class="input-group">

<label>Sisters</label>

<input type="number" id="sisters">

</div>

<button>

Continue →

</button>

</form>

</div>

</div>

<script type="module" src="js/family.js"></script>

</body>

</html>
